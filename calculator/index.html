<!doctype html>
<html>
<head>
    <title>Калькулятор</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <link rel="stylesheet" href="/main/main.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg"></div>
    <button id="back">Главная</button>
    <main>
        <h1>Калькулятор</h1>
        <div class="output"></div>
        <button id="copy">Скопировать</button>
    </main>
        
    <div class="rect1">
        <button>C</button>
        <button>^</button>
        <button>(</button>
    
        <button>7</button>
        <button>8</button>
        <button>9</button>
    
        <button>4</button>
        <button>5</button>
        <button>6</button>
    
        <button>1</button>
        <button>2</button>
        <button>3</button>
    
        <button>√</button>
        <button>0</button>
        <button>.</button>
    </div>

    <div class="rect2">
        <button>)</button>
        <button id="delLastChar">
            <img src="delete.png">
        </button>
    
        <button class="signs">+</button>
        <button class="signs">-</button>    
        <button class="signs">×</button>
        <button class="signs">÷</button>
    
        <button id="equal">=</button>
    </div>

    <div class="messageCopy">Скопировано</div>
    <script type="module" src="script.js"></script>
    <script type="module" src="/main/common.js"></script>
</body>
</html>
